# HSTS nur sinnvoll, wenn der Proxy X-Forwarded-Proto: https setzt (z. B. Coolify/Traefik).
map $http_x_forwarded_proto $hsts_header {
    default "";
    https   "max-age=31536000; includeSubDomains; preload";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm application/octet-stream;

    # Sicherheit — script-src ohne unsafe-eval (passt zu flutter build web --csp).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: http: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: data:; connect-src 'self' http: https: wss: ws: data: blob:; worker-src 'self' blob:; manifest-src 'self';" always;
    add_header Strict-Transport-Security $hsts_header always;

    # HTML-Shell nicht lang cachen (add_header hier: sonst würden server-Header für diese URL entfallen)
    location = /index.html {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: http: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: data:; connect-src 'self' http: https: wss: ws: data: blob:; worker-src 'self' blob:; manifest-src 'self';" always;
        add_header Strict-Transport-Security $hsts_header always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # Flutter Web / SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm)$ {
        try_files $uri =404;
        expires 1y;
    }
}
