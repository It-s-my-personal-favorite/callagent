# Kopieren nach docker-compose.yml und Werte anpassen.
# Ausführen im Ordner apps/marketing-site:
#   docker compose build && docker compose up -d

services:
  callagent-marketing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Beim Build setzen (in Client-Bundle) – an eigene Domains anpassen
        NEXT_PUBLIC_SITE_URL: "https://www.example.com"
        NEXT_PUBLIC_APP_URL: "https://app.example.com"
        NEXT_PUBLIC_SUPPORT_EMAIL: "support@example.com"
        NEXT_PUBLIC_HELP_PHONE: "0800 000 00 00"
        # Optional: Host-basierter Rewrite zur CallAgent-App (siehe next.config.mjs)
        # CALLAGENT_APP_UPSTREAM: "https://app-backend.example.com"
        # CALLAGENT_APP_PROXY_HOST: "app.example.com"
    image: callagent-marketing:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
