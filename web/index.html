<!DOCTYPE html>
<html lang="de">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CallAgent Admin: Dashboard, Live-Anrufe, Moderation und API-Status für Ihr Telefonie-Backend.">
  <meta name="theme-color" content="#3D5AFE">
  <meta name="color-scheme" content="light dark">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CallAgent Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <link rel="canonical" id="callagent-canonical" href="">
  <script>
    (function () {
      var el = document.getElementById('callagent-canonical');
      if (!el) return;
      var o = window.location.origin;
      var p = window.location.pathname || '/';
      if (p.length > 1 && p.endsWith('/')) p = p.slice(0, -1);
      el.href = o + p + (window.location.search || '');
    })();
  </script>

  <title>CallAgent Admin</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CallAgent Admin",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "inLanguage": "de"
  }
  </script>

  <style>
    html { box-sizing: border-box; }
    *, *::before, *::after { box-sizing: inherit; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f3f6ff;
      color: #203061;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #020715; color: #e8eeff; }
    }
    .callagent-boot {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      padding: 1.5rem;
      text-align: center;
    }
    .callagent-boot h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .callagent-boot p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.85;
      max-width: 28rem;
    }
    .callagent-boot .spinner {
      width: 2.25rem;
      height: 2.25rem;
      border: 3px solid rgba(61, 90, 254, 0.25);
      border-top-color: #3d5afe;
      border-radius: 50%;
      animation: callagent-spin 0.85s linear infinite;
      will-change: transform;
    }
    @media (prefers-color-scheme: dark) {
      .callagent-boot .spinner {
        border-color: rgba(124, 77, 255, 0.3);
        border-top-color: #b39dff;
      }
    }
    @keyframes callagent-spin {
      from { transform: translateZ(0) rotate(0deg); }
      to { transform: translateZ(0) rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .callagent-boot .spinner {
        animation: none;
        border-color: rgba(61, 90, 254, 0.45);
        border-top-color: #3d5afe;
      }
    }
    .callagent-boot[hidden] {
      display: none !important;
    }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip-link:focus {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 100000;
      width: auto;
      height: auto;
      padding: 10px 14px;
      background: #3d5afe;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
  </style>

  <script>
    (function () {
      function onFirstFrame() {
        var boot = document.querySelector('.callagent-boot');
        if (boot) {
          boot.removeAttribute('id');
          boot.setAttribute('hidden', '');
        }
        var host = document.querySelector('flt-glass-pane') || document.querySelector('flutter-view');
        if (host) host.id = 'callagent-main';
      }
      window.addEventListener('flutter-first-frame', onFirstFrame, false);
    })();
  </script>
  <script>
    (function () {
      var accessible = 'width=device-width, initial-scale=1.0, maximum-scale=5';
      function patchViewport() {
        var list = document.querySelectorAll('meta[name="viewport"]');
        for (var i = 0; i < list.length; i++) {
          var c = list[i].getAttribute('content') || '';
          if (c.indexOf('user-scalable=no') !== -1 || c.indexOf('maximum-scale=1') !== -1) {
            list[i].setAttribute('content', accessible);
          }
        }
      }
      patchViewport();
      var h = document.head;
      if (h && typeof MutationObserver !== 'undefined') {
        new MutationObserver(patchViewport).observe(h, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['content', 'name'],
        });
      }
      window.addEventListener('load', patchViewport);
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#callagent-main">Zum Inhalt springen</a>

  <div id="callagent-main" class="callagent-boot" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <h1>CallAgent Admin</h1>
    <p>Anwendung wird geladen … Bitte warten Sie einen Moment.</p>
  </div>

  <noscript>
    <div style="padding:2rem;font-family:system-ui,sans-serif;max-width:40rem;margin:0 auto;">
      <h1>JavaScript erforderlich</h1>
      <p>CallAgent Admin benötigt JavaScript. Bitte aktivieren Sie JavaScript in Ihrem Browser und laden Sie die Seite neu.</p>
    </div>
  </noscript>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
