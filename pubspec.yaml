name: callagent
description: Repo-Root-Runner für die Flutter-Admin-App (damit `flutter run` vom Workspace-Root funktioniert).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  callagent_admin:
    path: frontend/apps/admin-web

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
